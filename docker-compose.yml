services:
  morning-brief:
    build: .
    ports:
      - "5173:5173"       # maps your laptop's port 5173 → container's port 5173
    env_file:
      - .env              # loads ANTHROPIC_API_KEY from your .env file into the container
    volumes:
      - .:/app            # mounts your local folder into the container —
      - /app/node_modules #   so code changes reload live without rebuilding
